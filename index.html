<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeLeo Family Bank</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001f3f">
    <style>
        :root { --primary: #001f3f; --secondary: #2ecc71; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 10px; }
        
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); touch-action: manipulation; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary); }
        
        /* SIDE-BY-SIDE INTERFACE */
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .account-box { background: var(--primary); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .account-box.savings { background: #2c3e50; }
        .amt { font-size: 1.4rem; font-weight: bold; display: block; margin-top: 5px; }

        /* INPUTS & BUTTONS - CHROME MOBILE OPTIMIZED */
        input, select { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.97); }
        .btn-main { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-alt { background: var(--secondary); color: white; }
        .btn-logout { background: none; color: #888; text-decoration: underline; font-size: 0.9rem; margin-top: 15px; padding: 5px; }

        /* LEDGER */
        .ledger-section { margin-top: 25px; border-top: 2px solid #f0f0f0; padding-top: 15px; }
        .history-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #fafafa; font-size: 0.85rem; }
        .hist-meta { color: #999; font-size: 0.75rem; }
        .hist-note { color: #444; font-weight: 500; display: block; margin-top: 2px; }
        .pos { color: #27ae60; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <img src="images/logo.png" class="logo">
        <h2 style="color:var(--primary); margin: 10px 0 0 0;">DeLeo Family Bank</h2>
    </div>

    <div id="login-ui">
        <select id="user-pick"><option>Linnea</option><option>Dad</option></select>
        <input type="password" id="pin-box" placeholder="Enter PIN" inputmode="numeric" pattern="[0-9]*">
        <button class="btn-main" onclick="doAuth()">Enter Bank</button>
    </div>

    <div id="bank-ui" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <strong id="user-greeting"></strong>
            <button class="btn-logout" onclick="location.reload()">Exit</button>
        </div>

        <div class="balance-grid">
            <div class="account-box">
                <small>Checking</small>
                <span class="amt" id="val-chk">$0.00</span>
            </div>
            <div class="account-box savings">
                <small>Savings</small>
                <span class="amt" id="val-sav">$0.00</span>
            </div>
        </div>

        <div id="controls">
            <input type="number" id="amt-box" placeholder="Amount ($)" inputmode="decimal">
            <input type="text" id="note-box" placeholder="Description (e.g. Allowance, Toy)">
            
            <div id="dad-tools" class="hidden">
                <button class="btn-alt" onclick="process('deposit')">Add to Checking</button>
                <button class="btn-main" onclick="process('adjust')">Manual Override</button>
            </div>

            <div id="linnea-tools" class="hidden">
                <button class="btn-alt" onclick="process('save')">Transfer to Savings</button>
                <button class="btn-main" onclick="process('withdraw')">Withdrawal</button>
            </div>
        </div>

        <div class="ledger-section">
            <h4 style="margin: 0 0 10px 0; color: #555;">Recent Activity</h4>
            <div id="history-list">Loading history...</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7ESNf6m1F33BJkcPs9BZSiVO0EPLHsSjKEbORMrGsstNEvMI_jbkBh4Dp3Kt0K5S3Nw/exec";
    let appData = { pins: { Dad: "1234", Linnea: "0000" }, balances: { checking: 0, savings: 0 }, history: [] };

    async function fetchData() {
        try {
            const resp = await fetch(API_URL);
            const json = await resp.json();
            if (json.balances) appData = json;
            updateUI();
        } catch(e) { document.getElementById('history-list').innerText = "Starting fresh!"; }
    }

    function updateUI() {
        document.getElementById('val-chk').innerText = `$${appData.balances.checking.toFixed(2)}`;
        document.getElementById('val-sav').innerText = `$${appData.balances.savings.toFixed(2)}`;
        
        const list = document.getElementById('history-list');
        list.innerHTML = appData.history.slice(-8).reverse().map(i => `
            <div class="history-row">
                <div>
                    <span class="hist-meta">${i.date}</span>
                    <span class="hist-note">${i.user}: ${i.note}</span>
                </div>
                <span class="${i.amt >= 0 ? 'pos' : 'neg'}">${i.amt >= 0 ? '+' : ''}$${Math.abs(i.amt).toFixed(2)}</span>
            </div>
        `).join('') || "No activity yet.";
    }

    function doAuth() {
        const u = document.getElementById('user-pick').value;
        const p = document.getElementById('pin-box').value;
        if (appData.pins[u] === p) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('bank-ui').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = `Welcome, ${u}`;
            document.getElementById(u === 'Dad' ? 'dad-tools' : 'linnea-tools').classList.remove('hidden');
        } else { alert("Incorrect PIN"); }
    }

    async function process(action) {
        const val = parseFloat(document.getElementById('amt-box').value);
        const msg = document.getElementById('note-box').value;
        const user = document.getElementById('user-pick').value;

        if (!val || msg.length < 3) return alert("Enter amount and a short note.");

        let diff = 0;
        if (action === 'withdraw') {
            if (appData.balances.checking < val) return alert("Not enough in Checking!");
            appData.balances.checking -= val; diff = -val;
        } else if (action === 'save') {
            if (appData.balances.checking < val) return alert("Not enough in Checking!");
            appData.balances.checking -= val; appData.balances.savings += val; diff = -val;
        } else {
            appData.balances.checking += val; diff = val;
        }

        appData.history.push({ date: new Date().toLocaleDateString(), user, note: msg, amt: diff });
        updateUI();
        
        // Clear inputs
        document.getElementById('amt-box').value = '';
        document.getElementById('note-box').value = '';

        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ ...appData, lastAction: action }) 
        });
    }

    fetchData();
</script>

</body>
</html>
