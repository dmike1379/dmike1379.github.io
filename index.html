<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Bank</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --bg: #f8f9fa; }
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; touch-action: manipulation; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .hidden { display: none; }
        h2, h3 { color: #333; text-align: center; margin-top: 0; }
        .balance-card { background: #f0f4f8; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .balance-amt { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-deposit { background: #f39c12; color: white; }
        .btn-interest { background: #9b59b6; color: white; }
        .btn-logout { background: #eee; color: #666; font-size: 0.8rem; width: auto; }
        .admin-section { border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        label { font-size: 0.75rem; color: #666; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        
        /* Ledger Styling */
        .ledger-container { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .ledger-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .ledger-note { color: #555; display: block; font-style: italic; }
        .ledger-date { color: #999; font-size: 0.7rem; }
        .amt-pos { color: #2ecc71; font-weight: bold; }
        .amt-neg { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>Family Bank</h2>
        <select id="user-select">
            <option value="Linnea">Linnea</option>
            <option value="Dad">Dad</option>
        </select>
        <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
        <button class="btn-primary" onclick="attemptLogin()">Login</button>
    </div>

    <div id="main-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span id="welcome-msg" style="font-weight:bold"></span>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>

        <div class="balance-card">
            <small>Checking Balance</small>
            <div class="balance-amt" id="checking-val">$0.00</div>
            <small>Rate: <span id="int-chk-display">0</span>%</small>
        </div>
        <div class="balance-card">
            <small>Savings Balance</small>
            <div class="balance-amt" id="savings-val">$0.00</div>
            <small>Rate: <span id="int-sav-display">0</span>%</small>
        </div>

        <div id="linnea-controls" class="hidden">
            <h3>Manage Money</h3>
            <input type="number" id="trans-amt" placeholder="Amount $" inputmode="decimal">
            <input type="text" id="trans-note" placeholder="What is this for? (Required)">
            <button class="btn-secondary" style="width:100%" onclick="transferToSavings()">Move to Savings</button>
            <button class="btn-primary" onclick="withdraw()">Withdraw Cash</button>
            <button class="btn-logout" style="width:100%; margin-top:20px;" onclick="changePinPrompt('Linnea')">Change My PIN</button>
        </div>

        <div id="dad-controls" class="hidden">
            <div class="admin-section" style="background: #fff9eb; padding: 10px; border-radius: 10px; border: 1px solid #f39c12;">
                <h3>Instant Adjustment</h3>
                <div class="row">
                    <div class="col"><label>Chk Adjust $</label><input type="number" id="instant-chk" placeholder="0.00" inputmode="decimal"></div>
                    <div class="col"><label>Sav Adjust $</label><input type="number" id="instant-sav" placeholder="0.00" inputmode="decimal"></div>
                </div>
                <input type="text" id="dad-note" placeholder="Comment (e.g. Bonus, Chore)" style="margin-top: 10px;">
                <button class="btn-deposit" onclick="multiInstantAdjust()">Apply Adjustments</button>
            </div>

            <div class="admin-section">
                <h3>Weekly Auto-Allowance</h3>
                <div class="row">
                    <div class="col"><label>Chk $</label><input type="number" id="auto-chk" step="0.01"></div>
                    <div class="col"><label>Sav $</label><input type="number" id="auto-sav" step="0.01"></div>
                </div>
                <button class="btn-secondary" onclick="updateAutoDeposit()">Save Monday Amounts</button>
            </div>

            <div class="admin-section">
                <h3>Interest Rates % (Annual)</h3>
                <div class="row">
                    <div class="col"><label>Chk Rate %</label><input type="number" id="set-int-chk" step="0.01"></div>
                    <div class="col"><label>Sav Rate %</label><input type="number" id="set-int-sav" step="0.01"></div>
                </div>
                <button class="btn-primary" onclick="saveRatesOnly()">Save Annual Rates</button>
                <button class="btn-interest" onclick="applyInterestNow()">Apply 1 Month Interest Now</button>
            </div>

            <div class="admin-section">
                <button class="btn-logout" style="width:100%;" onclick="changePinPrompt('Dad')">Change Dad PIN</button>
                <button class="btn-logout" style="width:100%; margin-top:10px;" onclick="adminResetPin()">Reset Linnea PIN (0000)</button>
            </div>
        </div>

        <div class="ledger-container">
            <h3>Recent Activity</h3>
            <div id="ledger-list">Loading history...</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7ESNf6m1F33BJkcPs9BZSiVO0EPLHsSjKEbORMrGsstNEvMI_jbkBh4Dp3Kt0K5S3Nw/exec";

    let state = {
        pins: { Dad: "1234", Linnea: "0000" },
        balances: { checking: 0, savings: 0 },
        rates: { checking: 0, savings: 0 },
        autoDeposit: { checking: 0, savings: 0 },
        history: []
    };

    async function sync(actionType) {
        render();
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ ...state, lastAction: actionType }) 
        });
    }

    async function load() {
        try {
            const r = await fetch(API_URL);
            const data = await r.json();
            if (data.pins) state = data;
            render();
        } catch(e) { console.log("Connecting..."); }
    }

    function render() {
        document.getElementById('checking-val').innerText = `$${state.balances.checking.toFixed(2)}`;
        document.getElementById('savings-val').innerText = `$${state.balances.savings.toFixed(2)}`;
        document.getElementById('int-chk-display').innerText = state.rates.checking || 0;
        document.getElementById('int-sav-display').innerText = state.rates.savings || 0;
        document.getElementById('set-int-chk').value = state.rates.checking || 0;
        document.getElementById('set-int-sav').value = state.rates.savings || 0;
        document.getElementById('auto-chk').value = state.autoDeposit.checking || 0;
        document.getElementById('auto-sav').value = state.autoDeposit.savings || 0;

        const list = document.getElementById('ledger-list');
        list.innerHTML = state.history.slice(-8).reverse().map(h => `
            <div class="ledger-row">
                <div>
                    <span class="ledger-date">${h.date}</span>
                    <span class="ledger-note">${h.user}: ${h.note}</span>
                </div>
                <span class="${h.amt >= 0 ? 'amt-pos' : 'amt-neg'}">${h.amt >= 0 ? '+' : ''}$${Math.abs(h.amt).toFixed(2)}</span>
            </div>
        `).join('') || "No transactions yet.";
    }

    function attemptLogin() {
        const u = document.getElementById('user-select').value;
        const p = document.getElementById('pin-input').value;
        if (state.pins[u] === p) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Hello, " + u;
            document.getElementById(u === 'Dad' ? 'dad-controls' : 'linnea-controls').classList.remove('hidden');
        } else { alert("Incorrect PIN"); }
    }

    function recordTransaction(user, note, amt) {
        state.history.push({ date: new Date().toLocaleDateString(), user: user, note: note, amt: amt });
    }

    function multiInstantAdjust() {
        const cAmt = parseFloat(document.getElementById('instant-chk').value) || 0;
        const sAmt = parseFloat(document.getElementById('instant-sav').value) || 0;
        const note = document.getElementById('dad-note').value || "Dad Adjustment";

        if (cAmt === 0 && sAmt === 0) return alert("Enter an amount first.");
        
        if (cAmt !== 0) { state.balances.checking += cAmt; recordTransaction("Dad", note + " (Chk)", cAmt); }
        if (sAmt !== 0) { state.balances.savings += sAmt; recordTransaction("Dad", note + " (Sav)", sAmt); }

        document.getElementById('instant-chk').value = '';
        document.getElementById('instant-sav').value = '';
        document.getElementById('dad-note').value = '';
        sync("Adjustment");
        alert(`Adjusted: Chk $${cAmt.toFixed(2)} | Sav $${sAmt.toFixed(2)}`);
    }

    function updateAutoDeposit() {
        state.autoDeposit.checking = parseFloat(document.getElementById('auto-chk').value) || 0;
        state.autoDeposit.savings = parseFloat(document.getElementById('auto-sav').value) || 0;
        sync("Setting Update"); 
        alert("Weekly allowance settings saved!");
    }

    function saveRatesOnly() {
        state.rates.checking = parseFloat(document.getElementById('set-int-chk').value) || 0;
        state.rates.savings = parseFloat(document.getElementById('set-int-sav').value) || 0;
        sync("Rate Update");
        alert("Annual rates saved.");
    }

    function applyInterestNow() {
        const rChk = state.rates.checking || 0;
        const rSav = state.rates.savings || 0;
        const earnedChk = state.balances.checking * (rChk / 100 / 12);
        const earnedSav = state.balances.savings * (rSav / 100 / 12);
        state.balances.checking += earnedChk;
        state.balances.savings += earnedSav;
        recordTransaction("Bank", "Interest (Chk)", earnedChk);
        recordTransaction("Bank", "Interest (Sav)", earnedSav);
        sync("Interest"); 
        alert(`Interest Applied!`);
    }

    function transferToSavings() {
        const amt = parseFloat(document.getElementById('trans-amt').value);
        const note = document.getElementById('trans-note').value || "Transfer to Savings";
        if (amt > 0 && state.balances.checking >= amt) {
            state.balances.checking -= amt;
            state.balances.savings += amt;
            recordTransaction("Linnea", note, -amt);
            document.getElementById('trans-amt').value = '';
            document.getElementById('trans-note').value = '';
            sync("Transfer");
            alert(`Moved $${amt.toFixed(2)} to Savings!`);
        } else { alert("Insufficient funds in Checking or invalid amount."); }
    }

    function withdraw() {
        const amt = parseFloat(document.getElementById('trans-amt').value);
        const note = document.getElementById('trans-note').value;
        if (!note) return alert("Please enter what this is for.");
        if (amt > 0 && state.balances.checking >= amt) {
            state.balances.checking -= amt;
            recordTransaction("Linnea", note, -amt);
            document.getElementById('trans-amt').value = '';
            document.getElementById('trans-note').value = '';
            sync("Withdrawal"); 
            alert(`Withdrawal logged for $${amt.toFixed(2)}!\nCollect your cash from Dad.`);
        } else { alert("Insufficient funds or invalid amount."); }
    }

    function changePinPrompt(user) {
        const p = prompt(`Enter new 4-digit PIN for ${user}:`);
        if (p && p.length === 4 && !isNaN(p)) { 
            state.pins[user] = p; 
            sync("PIN Change"); 
            alert(`${user} PIN updated.`);
        } else { alert("Invalid PIN. Please enter exactly 4 numbers."); }
    }

    function adminResetPin() {
        state.pins.Linnea = "0000"; sync("PIN Reset"); alert("Linnea reset to 0000");
    }

    load();
</script>
</body>
</html>
