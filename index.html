<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Bank</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="apple-touch-icon" href="images/icon.png">
    <meta name="theme-color" content="#4a90e2">
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --bg: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; touch-action: manipulation; }
        .container { background: white; padding: 1.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; position: relative; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* BRANDING */
        .header-banner { width: calc(100% + 3rem); margin: -1.5rem -1.5rem 15px -1.5rem; display: block; border-bottom: 2px solid #eee; }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .bank-logo { width: 100px; height: auto; margin: 0 auto; display: block; }
        
        h2, h3 { color: #333; text-align: center; margin-top: 0; }
        .balance-card { background: #f0f4f8; padding: 12px; border-radius: 10px; margin-bottom: 8px; text-align: center; border: 1px solid #e1e8ed; }
        .balance-amt { font-size: 1.6rem; font-weight: bold; color: var(--primary); }
        .rate-badge { font-size: 0.7rem; color: #7f8c8d; font-weight: bold; margin-top: 4px; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; outline: none; background: white; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-history { background: #34495e; color: white; margin-bottom: 15px; }
        .btn-deposit { background: #f39c12; color: white; }
        .btn-interest { background: #9b59b6; color: white; }
        .btn-logout { background: #eee; color: #666; font-size: 0.8rem; width: auto; }
        
        .admin-section { border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; }
        .row { display: flex; gap: 8px; }
        .col { flex: 1; }
        label { font-size: 0.7rem; color: #666; font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; }
        
        /* VAULT OVERLAY */
        #history-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 15px; overflow-y: auto; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .filter-grid select { margin-bottom: 0; font-size: 11px; padding: 6px; height: 35px; }
        
        /* 3-COLUMN LEDGER */
        .ledger-row { display: grid; grid-template-columns: 55px 1fr 85px; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f2f2f2; font-size: 0.75rem; align-items: center; }
        .acct-tag { font-weight: bold; text-align: center; background: #dfe6e9; border-radius: 4px; padding: 4px; font-size: 9px; color: #2d3436; }
        .amt-pos { color: #2ecc71; font-weight: bold; text-align: right; }
        .amt-neg { color: #e74c3c; font-weight: bold; text-align: right; }
        .time-label { color: #aaa; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="container">
    <img src="images/banner.png" class="header-banner" alt="Family Bank Banner" onerror="this.style.display='none'">

    <div id="login-screen">
        <div class="logo-container">
            <img src="images/logo.png" class="bank-logo" alt="Bank Logo" onerror="this.style.display='none'">
            <h2>Family Bank</h2>
        </div>
        <select id="user-select">
            <option value="Linnea">Linnea</option>
            <option value="Dad">Dad</option>
        </select>
        <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
        <button class="btn-primary" onclick="attemptLogin()">Login</button>
        <p id="status-msg" style="text-align:center; font-size:10px; color:#999; margin-top:10px;">Initializing...</p>
    </div>

    <div id="main-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="welcome-msg" style="font-weight:bold"></span>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>

        <div class="balance-card">
            <small>Checking Balance</small>
            <div class="balance-amt" id="checking-val">$0.00</div>
            <div class="rate-badge">Rate: <span id="int-chk-display">0</span>%</div>
        </div>
        <div class="balance-card">
            <small>Savings Balance</small>
            <div class="balance-amt" id="savings-val">$0.00</div>
            <div class="rate-badge">Rate: <span id="int-sav-display">0</span>%</div>
        </div>

        <button class="btn-history" onclick="toggleHistory(true)">📜 View Full History Vault</button>

        <div id="linnea-controls" class="hidden">
            <h3>Manage Money</h3>
            <input type="number" id="trans-amt" placeholder="Amount $0.00" step="0.01" onblur="if(this.value) this.value = parseFloat(this.value).toFixed(2)">
            <input type="text" id="trans-note" placeholder="What is this for? (Required)">
            <button class="btn-secondary" onclick="transferToSavings()">Move to Savings</button>
            <button class="btn-primary" onclick="withdraw()">Withdraw Cash</button>
            <button class="btn-logout" style="width:100%; margin-top:20px;" onclick="changePinPrompt('Linnea')">Change My PIN</button>
        </div>

        <div id="dad-controls" class="hidden">
            <div class="admin-section" style="background: #fff9eb; padding: 10px; border-radius: 10px; border: 1px solid #f39c12;">
                <h3>Instant Adjustment</h3>
                <div class="row">
                    <div class="col"><label>Chk $</label><input type="number" id="instant-chk" placeholder="0.00" step="0.01" onblur="if(this.value) this.value = parseFloat(this.value).toFixed(2)"></div>
                    <div class="col"><label>Sav $</label><input type="number" id="instant-sav" placeholder="0.00" step="0.01" onblur="if(this.value) this.value = parseFloat(this.value).toFixed(2)"></div>
                </div>
                <input type="text" id="dad-note" placeholder="Reason (Required) *" style="margin-top:5px;">
                <button class="btn-deposit" onclick="multiInstantAdjust()">Apply Adjustments</button>
            </div>

            <div class="admin-section">
                <h3>Weekly Allowance</h3>
                <div class="row">
                    <div class="col"><label>Chk $</label><input type="number" id="auto-chk" step="0.01"></div>
                    <div class="col"><label>Sav $</label><input type="number" id="auto-sav" step="0.01"></div>
                </div>
                <button class="btn-secondary" onclick="updateAutoDeposit()">Save Allowance</button>
            </div>

            <div class="admin-section">
                <h3>Annual Interest %</h3>
                <div class="row">
                    <div class="col"><label>Chk %</label><input type="number" id="set-int-chk" step="0.01"></div>
                    <div class="col"><label>Sav %</label><input type="number" id="set-int-sav" step="0.01"></div>
                </div>
                <button class="btn-primary" onclick="saveRatesOnly()">Save Rates</button>
                <button class="btn-interest" onclick="applyInterestNow()">Apply 1 Month Now</button>
            </div>

            <div class="admin-section">
                <button class="btn-logout" style="width:100%;" onclick="changePinPrompt('Dad')">Change Dad PIN</button>
                <button class="btn-logout" style="width:100%; margin-top:10px;" onclick="adminResetPin()">Reset Linnea PIN (0000)</button>
            </div>
        </div>
    </div>
</div>

<div id="history-page" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px; border-bottom: 2px solid #eee; padding-bottom:10px;">
        <h3 style="margin:0;">Transaction Vault</h3>
        <button class="btn-logout" style="background:#ff7675; color:white; padding:5px 12px;" onclick="toggleHistory(false)">Close</button>
    </div>
    
    <div class="filter-grid">
        <div class="col"><label>Sort</label>
            <select id="sort-by" onchange="renderHistory()"><option value="newest">Newest</option><option value="high">Highest $</option></select>
        </div>
        <div class="col"><label>User</label>
            <select id="filter-user" onchange="renderHistory()"><option value="all">Everyone</option><option value="Dad">Dad</option><option value="Linnea">Linnea</option></select>
        </div>
        <div class="col"><label>Account</label>
            <select id="filter-acct" onchange="renderHistory()"><option value="all">All Accts</option><option value="Chk">Checking</option><option value="Sav">Savings</option></select>
        </div>
        <div class="col"><label>Type</label>
            <select id="filter-type" onchange="renderHistory()"><option value="all">All Types</option><option value="credit">Income</option><option value="debit">Spent</option></select>
        </div>
    </div>

    <div id="full-ledger-list"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7ESNf6m1F33BJkcPs9BZSiVO0EPLHsSjKEbORMrGsstNEvMI_jbkBh4Dp3Kt0K5S3Nw/exec";
    let state = { pins: { Dad: "1234", Linnea: "0000" }, balances: { checking: 0, savings: 0 }, rates: { checking: 0, savings: 0 }, autoDeposit: { checking: 0, savings: 0 }, history: [] };

    function fmt(val) { return "$" + (parseFloat(val) || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    async function load() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            if (data && data.pins) { state = data; document.getElementById('status-msg').innerText = "System Ready"; render(); }
        } catch(e) { document.getElementById('status-msg').innerText = "Cloud Connection Error"; }
    }

    function render() {
        document.getElementById('checking-val').innerText = fmt(state.balances.checking);
        document.getElementById('savings-val').innerText = fmt(state.balances.savings);
        document.getElementById('int-chk-display').innerText = state.rates.checking || 0;
        document.getElementById('int-sav-display').innerText = state.rates.savings || 0;
        document.getElementById('set-int-chk').value = state.rates.checking || 0;
        document.getElementById('set-int-sav').value = state.rates.savings || 0;
        document.getElementById('auto-chk').value = (state.autoDeposit.checking || 0).toFixed(2);
        document.getElementById('auto-sav').value = (state.autoDeposit.savings || 0).toFixed(2);
    }

    function toggleHistory(show) {
        document.getElementById('history-page').classList.toggle('hidden', !show);
        if (show) renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('full-ledger-list');
        const sortVal = document.getElementById('sort-by').value;
        const userFilter = document.getElementById('filter-user').value;
        const acctFilter = document.getElementById('filter-acct').value;
        const typeFilter = document.getElementById('filter-type').value;

        let logs = (state.history || []).filter(h => {
            const matchUser = userFilter === 'all' || h.user === userFilter;
            const matchAcct = acctFilter === 'all' || (h.note && h.note.includes(`(${acctFilter})`)) || (h.note && h.note.includes(`To ${acctFilter}`));
            const matchType = typeFilter === 'all' || (typeFilter === 'credit' ? h.amt >= 0 : h.amt < 0);
            return matchUser && matchAcct && matchType;
        });

        if (sortVal === 'newest') logs = [...logs].reverse();
        else if (sortVal === 'high') logs.sort((a, b) => Math.abs(b.amt) - Math.abs(a.amt));

        list.innerHTML = logs.map(h => {
            const acct = h.note.includes('(Sav)') || h.note.includes('To Sav') ? 'SAV' : 'CHK';
            return `
            <div class="ledger-row">
                <div class="acct-tag">${acct}</div>
                <div><span class="time-label">${h.date}</span><br><strong>${h.user}</strong>: ${h.note}</div>
                <div class="${h.amt >= 0 ? 'amt-pos' : 'amt-neg'}">${h.amt >= 0 ? '+' : ''}${fmt(Math.abs(h.amt))}</div>
            </div>`;
        }).join('');
    }

    function record(user, note, amt) {
        const now = new Date();
        const dateStr = now.toLocaleDateString(undefined, {month:'numeric', day:'numeric'}) + " " + now.toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
        if(!state.history) state.history = [];
        state.history.push({ date: dateStr, user: user, note: note, amt: amt });
    }

    function attemptLogin() {
        const u = document.getElementById('user-select').value;
        const p = document.getElementById('pin-input').value;
        if (state.pins[u] === p) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Hello, " + u;
            document.getElementById(u === 'Dad' ? 'dad-controls' : 'linnea-controls').classList.remove('hidden');
            render();
        } else { alert("Incorrect PIN"); }
    }

    async function sync(action) {
        render();
        try { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...state, lastAction: action }) }); } catch(e) {}
    }

    function multiInstantAdjust() {
        const c = parseFloat(document.getElementById('instant-chk').value) || 0;
        const s = parseFloat(document.getElementById('instant-sav').value) || 0;
        const n = document.getElementById('dad-note').value.trim();
        if ((c === 0 && s === 0) || !n) { alert("Enter amount and a reason!"); return; }
        if (c !== 0) { state.balances.checking += c; record("Dad", n + " (Chk)", c); }
        if (s !== 0) { state.balances.savings += s; record("Dad", n + " (Sav)", s); }
        document.getElementById('instant-chk').value = ''; document.getElementById('instant-sav').value = ''; document.getElementById('dad-note').value = '';
        sync("Adjustment");
    }

    function updateAutoDeposit() {
        state.autoDeposit.checking = parseFloat(document.getElementById('auto-chk').value) || 0;
        state.autoDeposit.savings = parseFloat(document.getElementById('auto-sav').value) || 0;
        sync("Allowance Update"); alert("Allowance rates updated.");
    }

    function saveRatesOnly() {
        state.rates.checking = parseFloat(document.getElementById('set-int-chk').value) || 0;
        state.rates.savings = parseFloat(document.getElementById('set-int-sav').value) || 0;
        sync("Rates Update"); alert("Interest rates saved.");
    }

    function applyInterestNow() {
        const cE = state.balances.checking * (state.rates.checking / 100 / 12);
        const sE = state.balances.savings * (state.rates.savings / 100 / 12);
        state.balances.checking += cE; state.balances.savings += sE;
        record("Bank", "Interest (Chk)", cE); record("Bank", "Interest (Sav)", sE);
        sync("Interest Run"); alert("One month of interest added.");
    }

    function transferToSavings() {
        const a = parseFloat(document.getElementById('trans-amt').value);
        const n = document.getElementById('trans-note').value.trim();
        if (!n || a <= 0 || state.balances.checking < a) { alert("Check your balance and provide a note!"); return; }
        state.balances.checking -= a; state.balances.savings += a;
        record("Linnea", "To Sav: " + n, -a);
        document.getElementById('trans-amt').value = ''; document.getElementById('trans-note').value = '';
        sync("Transfer");
    }

    function withdraw() {
        const a = parseFloat(document.getElementById('trans-amt').value);
        const n = document.getElementById('trans-note').value.trim();
        if (!n || a <= 0 || state.balances.checking < a) { alert("Check your balance and provide a note!"); return; }
        state.balances.checking -= a; record("Linnea", n, -a);
        document.getElementById('trans-amt').value = ''; document.getElementById('trans-note').value = '';
        sync("Withdrawal");
    }

    function changePinPrompt(u) {
        const p = prompt("Enter a new 4-digit PIN:");
        if (p && p.length === 4) { state.pins[u] = p; sync("PIN Update"); alert("PIN successfully changed."); }
    }

    function adminResetPin() {
        state.pins.Linnea = "0000"; sync("PIN Reset"); alert("Linnea's PIN reset to 0000");
    }

    load();
</script>
</body>
</html>
