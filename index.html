<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Bank</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --bg: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; touch-action: manipulation; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .hidden { display: none; }
        h2, h3 { color: #333; text-align: center; margin-top: 0; }
        .balance-card { background: #f0f4f8; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .balance-amt { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-deposit { background: #f39c12; color: white; }
        .btn-interest { background: #9b59b6; color: white; }
        .btn-logout { background: #eee; color: #666; font-size: 0.8rem; width: auto; }
        .admin-section { border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        label { font-size: 0.75rem; color: #666; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .ledger-container { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .ledger-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .amt-pos { color: #2ecc71; font-weight: bold; }
        .amt-neg { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>Family Bank</h2>
        <select id="user-select">
            <option value="Linnea">Linnea</option>
            <option value="Dad">Dad</option>
        </select>
        <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
        <button class="btn-primary" onclick="attemptLogin()">Login</button>
        <p id="status-msg" style="text-align:center; font-size:10px; color:#999; margin-top:10px;">Connecting...</p>
    </div>

    <div id="main-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span id="welcome-msg" style="font-weight:bold"></span>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>

        <div class="balance-card">
            <small>Checking Balance</small>
            <div class="balance-amt" id="checking-val">$0.00</div>
            <small>Rate: <span id="int-chk-display">0</span>%</small>
        </div>
        <div class="balance-card">
            <small>Savings Balance</small>
            <div class="balance-amt" id="savings-val">$0.00</div>
            <small>Rate: <span id="int-sav-display">0</span>%</small>
        </div>

        <div id="linnea-controls" class="hidden">
            <h3>Manage Money</h3>
            <input type="number" id="trans-amt" placeholder="Amount $0.00" inputmode="decimal">
            <input type="text" id="trans-note" placeholder="What is this for? (Required)">
            <button class="btn-secondary" onclick="transferToSavings()">Move to Savings</button>
            <button class="btn-primary" onclick="withdraw()">Withdraw Cash</button>
            <button class="btn-logout" style="width:100%; margin-top:20px;" onclick="changePinPrompt('Linnea')">Change My PIN</button>
        </div>

        <div id="dad-controls" class="hidden">
            <div class="admin-section" style="background: #fff9eb; padding: 10px; border-radius: 10px; border: 1px solid #f39c12;">
                <h3>Instant Adjustment</h3>
                <div class="row">
                    <div class="col"><label>Chk $</label><input type="number" id="instant-chk" placeholder="0.00" inputmode="decimal"></div>
                    <div class="col"><label>Sav $</label><input type="number" id="instant-sav" placeholder="0.00" inputmode="decimal"></div>
                </div>
                <input type="text" id="dad-note" placeholder="Reason (e.g. Bonus, Chore) *" style="margin-top:5px;">
                <button class="btn-deposit" onclick="multiInstantAdjust()">Apply Adjustments</button>
            </div>

            <div class="admin-section">
                <h3>Weekly Allowance</h3>
                <div class="row">
                    <div class="col"><label>Chk $</label><input type="number" id="auto-chk" step="0.01"></div>
                    <div class="col"><label>Sav $</label><input type="number" id="auto-sav" step="0.01"></div>
                </div>
                <button class="btn-secondary" onclick="updateAutoDeposit()">Save Amounts</button>
            </div>

            <div class="admin-section">
                <h3>Annual Interest %</h3>
                <div class="row">
                    <div class="col"><label>Chk %</label><input type="number" id="set-int-chk" step="0.01"></div>
                    <div class="col"><label>Sav %</label><input type="number" id="set-int-sav" step="0.01"></div>
                </div>
                <button class="btn-primary" onclick="saveRatesOnly()">Save Rates</button>
                <button class="btn-interest" onclick="applyInterestNow()">Apply 1 Month Now</button>
            </div>

            <div class="admin-section">
                <button class="btn-logout" style="width:100%;" onclick="changePinPrompt('Dad')">Change Dad PIN</button>
                <button class="btn-logout" style="width:100%; margin-top:10px;" onclick="adminResetPin()">Reset Linnea PIN (0000)</button>
            </div>
        </div>

        <div class="ledger-container">
            <h3>Recent Activity</h3>
            <div id="ledger-list">No activity found.</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7ESNf6m1F33BJkcPs9BZSiVO0EPLHsSjKEbORMrGsstNEvMI_jbkBh4Dp3Kt0K5S3Nw/exec";

    let state = {
        pins: { Dad: "1234", Linnea: "0000" },
        balances: { checking: 0, savings: 0 },
        rates: { checking: 0, savings: 0 },
        autoDeposit: { checking: 0, savings: 0 },
        history: []
    };

    function fmt(val) {
        return "$" + (val || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    async function load() {
        const status = document.getElementById('status-msg');
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            if (data && data.pins) {
                state = data;
                status.innerText = "Vault Connected";
                render();
            }
        } catch(e) {
            status.innerText = "Offline Mode";
        }
    }

    function render() {
        document.getElementById('checking-val').innerText = fmt(state.balances.checking);
        document.getElementById('savings-val').innerText = fmt(state.balances.savings);
        document.getElementById('int-chk-display').innerText = state.rates.checking || 0;
        document.getElementById('int-sav-display').innerText = state.rates.savings || 0;
        document.getElementById('set-int-chk').value = state.rates.checking || 0;
        document.getElementById('set-int-sav').value = state.rates.savings || 0;
        document.getElementById('auto-chk').value = state.autoDeposit.checking || 0;
        document.getElementById('auto-sav').value = state.autoDeposit.savings || 0;

        const list = document.getElementById('ledger-list');
        if (state.history && state.history.length > 0) {
            list.innerHTML = state.history.slice(-12).reverse().map(h => `
                <div class="ledger-row">
                    <div><small>${h.date}</small><br><strong>${h.user}</strong>: ${h.note}</div>
                    <div class="${h.amt >= 0 ? 'amt-pos' : 'amt-neg'}">${h.amt >= 0 ? '+' : '-'}${fmt(Math.abs(h.amt))}</div>
                </div>
            `).join('');
        }
    }

    function attemptLogin() {
        const u = document.getElementById('user-select').value;
        const p = document.getElementById('pin-input').value;
        if (state.pins[u] === p) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Hello, " + u;
            document.getElementById(u === 'Dad' ? 'dad-controls' : 'linnea-controls').classList.remove('hidden');
            render();
        } else { alert("Incorrect PIN"); }
    }

    async function sync(action) {
        render();
        try {
            await fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ ...state, lastAction: action }) 
            });
        } catch(e) { console.error("Sync Error"); }
    }

    function record(user, note, amt) {
        if (!state.history) state.history = [];
        const dateStr = new Date().toLocaleDateString(undefined, {month:'numeric', day:'numeric'});
        state.history.push({ date: dateStr, user: user, note: note, amt: amt });
    }

    function multiInstantAdjust() {
        const c = parseFloat(document.getElementById('instant-chk').value) || 0;
        const s = parseFloat(document.getElementById('instant-sav').value) || 0;
        const n = document.getElementById('dad-note').value.trim();

        if (!n) { alert("Please enter a comment for the ledger."); return; }
        let performed = false;

        if (c !== 0) { state.balances.checking += c; record("Dad", n + " (Chk)", c); performed = true; }
        if (s !== 0) { state.balances.savings += s; record("Dad", n + " (Sav)", s); performed = true; }

        if (performed) {
            document.getElementById('instant-chk').value = '';
            document.getElementById('instant-sav').value = '';
            document.getElementById('dad-note').value = '';
            sync("Adjustment");
        } else { alert("Enter an amount!"); }
    }

    function updateAutoDeposit() {
        state.autoDeposit.checking = parseFloat(document.getElementById('auto-chk').value) || 0;
        state.autoDeposit.savings = parseFloat(document.getElementById('auto-sav').value) || 0;
        sync("Settings"); alert("Saved!");
    }

    function saveRatesOnly() {
        state.rates.checking = parseFloat(document.getElementById('set-int-chk').value) || 0;
        state.rates.savings = parseFloat(document.getElementById('set-int-sav').value) || 0;
        sync("Rates"); alert("Rates Saved!");
    }

    function applyInterestNow() {
        const cE = state.balances.checking * (state.rates.checking / 100 / 12);
        const sE = state.balances.savings * (state.rates.savings / 100 / 12);
        state.balances.checking += cE; state.balances.savings += sE;
        record("Bank", "Interest (Chk)", cE); record("Bank", "Interest (Sav)", sE);
        sync("Interest"); alert("Interest Applied!");
    }

    function transferToSavings() {
        const a = parseFloat(document.getElementById('trans-amt').value);
        const n = document.getElementById('trans-note').value.trim();
        if (!n) { alert("Please explain why you are moving money."); return; }
        
        if (a > 0 && state.balances.checking >= a) {
            state.balances.checking -= a; state.balances.savings += a;
            record("Linnea", "To Sav: " + n, -a);
            document.getElementById('trans-amt').value = '';
            document.getElementById('trans-note').value = '';
            sync("Transfer");
        } else { alert("Insufficient funds"); }
    }

    function withdraw() {
        const a = parseFloat(document.getElementById('trans-amt').value);
        const n = document.getElementById('trans-note').value.trim();
        if (!n) { alert("Please enter what this cash is for."); return; }

        if (a > 0 && state.balances.checking >= a) {
            state.balances.checking -= a; record("Linnea", n, -a);
            document.getElementById('trans-amt').value = '';
            document.getElementById('trans-note').value = '';
            sync("Withdrawal");
        } else { alert("Insufficient funds"); }
    }

    function changePinPrompt(u) {
        const p = prompt("New 4-digit PIN:");
        if (p && p.length === 4) { state.pins[u] = p; sync("PIN Change"); alert("PIN Updated!"); }
    }

    function adminResetPin() {
        state.pins.Linnea = "0000"; sync("Reset"); alert("Linnea reset to 0000");
    }

    load();
</script>
</body>
</html>
