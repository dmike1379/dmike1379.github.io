<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeLeo Family Bank</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001f3f">
    <style>
        :root { --primary: #001f3f; --secondary: #2ecc71; --bg: #f0f2f5; --accent: #f39c12; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-logo { width: 60px; height: 60px; border-radius: 50%; }
        .hidden { display: none; }
        .balance-card { background: linear-gradient(135deg, #001f3f 0%, #003366 100%); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .balance-amt { font-size: 2rem; font-weight: 800; }
        
        /* LEDGER STYLES */
        .ledger-container { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .ledger-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .ledger-date { color: #888; font-size: 0.7rem; }
        .ledger-comment { display: block; color: #555; font-style: italic; margin-top: 2px; }
        .amt-pos { color: #2ecc71; font-weight: bold; }
        .amt-neg { color: #e74c3c; font-weight: bold; }

        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 8px; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-logout { background: #f8f9fa; color: #666; font-size: 0.8rem; width: auto; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <img src="images/logo.png" class="brand-logo">
        <h2 style="margin:5px 0; color:var(--primary)">DeLeo Family Bank</h2>
    </div>

    <div id="login-screen">
        <select id="user-select"><option>Linnea</option><option>Dad</option></select>
        <input type="password" id="pin-input" placeholder="PIN" inputmode="numeric" maxlength="4">
        <button class="btn-primary" onclick="attemptLogin()">Login</button>
    </div>

    <div id="main-interface" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span id="welcome-msg" style="font-weight:bold"></span>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>

        <div class="balance-card">
            <small>Checking</small><div class="balance-amt" id="checking-val">$0.00</div>
        </div>
        <div class="balance-card" style="background:#333">
            <small>Savings</small><div class="balance-amt" id="savings-val">$0.00</div>
        </div>

        <div id="transaction-area">
            <h3>New Transaction</h3>
            <input type="number" id="trans-amt" placeholder="Amount $">
            <input type="text" id="trans-comment" placeholder="What is this for? (e.g. Robux, Chores)">
            
            <div id="linnea-controls" class="hidden">
                <button class="btn-secondary" onclick="executeTrans('save')">Move to Savings</button>
                <button class="btn-primary" onclick="executeTrans('withdraw')">Withdraw Cash</button>
            </div>

            <div id="dad-controls" class="hidden">
                <button class="btn-secondary" onclick="executeTrans('deposit')">Add to Checking</button>
                <button class="btn-primary" onclick="executeTrans('adjust')">Manual Adjustment</button>
            </div>
        </div>

        <div class="ledger-container">
            <h3 style="text-align:left">Recent Activity</h3>
            <div id="ledger-list">Loading history...</div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7ESNf6m1F33BJkcPs9BZSiVO0EPLHsSjKEbORMrGsstNEvMI_jbkBh4Dp3Kt0K5S3Nw/exec";
    let state = { pins: { Dad: "1234", Linnea: "0000" }, balances: { checking: 0, savings: 0 }, history: [] };

    async function sync(actionDescription) {
        render();
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...state, lastAction: actionDescription }) });
    }

    async function load() {
        try {
            const r = await fetch(API_URL);
            const data = await r.json();
            if (data.pins) state = data;
            render();
        } catch(e) { document.getElementById('ledger-list').innerText = "No activity yet."; }
    }

    function render() {
        document.getElementById('checking-val').innerText = `$${state.balances.checking.toFixed(2)}`;
        document.getElementById('savings-val').innerText = `$${state.balances.savings.toFixed(2)}`;
        
        const list = document.getElementById('ledger-list');
        list.innerHTML = state.history.slice(-10).reverse().map(h => `
            <div class="ledger-row">
                <div>
                    <span class="ledger-date">${h.date}</span>
                    <span class="ledger-comment">${h.user}: ${h.note}</span>
                </div>
                <span class="${h.amt >= 0 ? 'amt-pos' : 'amt-neg'}">${h.amt >= 0 ? '+' : ''}$${Math.abs(h.amt).toFixed(2)}</span>
            </div>
        `).join('') || "No transactions yet.";
    }

    function attemptLogin() {
        const u = document.getElementById('user-select').value;
        const p = document.getElementById('pin-input').value;
        if (state.pins[u] === p) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Hi, " + u;
            document.getElementById(u === 'Dad' ? 'dad-controls' : 'linnea-controls').classList.remove('hidden');
        } else { alert("Wrong PIN"); }
    }

    function executeTrans(type) {
        const amt = parseFloat(document.getElementById('trans-amt').value);
        const note = document.getElementById('trans-comment').value;
        const user = document.getElementById('user-select').value;

        if (!amt || note.length < 4) {
            alert("Please enter an amount and a detailed comment (min 4 chars).");
            return;
        }

        let change = 0;
        if (type === 'withdraw') {
            if (state.balances.checking < amt) return alert("Low funds!");
            state.balances.checking -= amt; change = -amt;
        } else if (type === 'save') {
            if (state.balances.checking < amt) return alert("Low funds!");
            state.balances.checking -= amt; state.balances.savings += amt; change = -amt;
        } else if (type === 'deposit' || type === 'adjust') {
            state.balances.checking += amt; change = amt;
        }

        state.history.push({ date: new Date().toLocaleDateString(), user, note, amt: change });
        document.getElementById('trans-amt').value = '';
        document.getElementById('trans-comment').value = '';
        sync(type);
    }

    load();
</script>
</body>
</html>
